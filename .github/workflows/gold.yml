name: Gold Price Watcher

on:
  schedule:
    - cron: "*/20 * * * *"   # ปลุกทุก 20 นาที (เวลาอาจคลาดเคลื่อนได้ เป็นปกติของ GitHub)
  workflow_dispatch:          # ปุ่มกดรันเองสำหรับทดสอบ

permissions:
  contents: write

jobs:
  check-gold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run gold check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python gold_check.py

      - name: Save base price back to repo
        run: |
          git config user.name "gold-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update base price"
          git push
