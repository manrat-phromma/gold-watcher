name: Gold Price Watcher

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-gold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run gold check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python gold_check.py

      - name: Save base price back to repo
        run: |
          if [ -f state.json ]; then
            git config user.name "gold-bot"
            git config user.email "bot@users.noreply.github.com"
            git pull --rebase || true
            git add state.json
            git diff --staged --quiet || git commit -m "update base price"
            git push
          else
            echo "no state.json to save (price fetch may have failed) - skipping"
          fi
